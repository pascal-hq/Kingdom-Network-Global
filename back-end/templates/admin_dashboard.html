<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kingdom Admin Dashboard</title>
    <style>
    /* ========== CSS VARIABLES (Matching Frontend) ========== */
    :root {
        --navy-deep: #0A1128;
        --navy-mid: #1B2A4A;
        --navy-light: #243B55;
        --gold-primary: #C9A03D;
        --gold-light: #E2C275;
        --gold-dark: #A8842A;
        --white-off: #F4F6F9;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 215, 0, 0.15);
        --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.1);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.15);
        --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.2);
        --shadow-glow: 0 0 20px rgba(201, 160, 61, 0.3);
        --transition-fast: 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        --transition-smooth: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy-mid) 50%, var(--navy-light) 100%);
        color: var(--white-off);
        line-height: 1.6;
        padding-bottom: 80px;
    }

    /* Noise texture overlay (matching frontend) */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
        background-repeat: repeat;
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
    }

    /* Header - matching frontend */
    .header {
        position: sticky;
        top: 0;
        width: 100%;
        z-index: 1000;
        background: rgba(10, 17, 40, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        transition: all var(--transition-smooth);
        padding: 0.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .header.scrolled {
        background: rgba(10, 17, 40, 0.95);
        box-shadow: var(--shadow-md);
    }

    .logo h1 {
        font-family: 'Playfair Display', serif;
        font-size: 1.3rem;
        color: var(--gold-primary);
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .role-badge {
        background: rgba(201, 160, 61, 0.2);
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        color: var(--gold-primary);
        font-weight: 500;
    }

    .logout-btn {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        padding: 0.5rem 1rem;
        border-radius: 50px;
        color: var(--white-off);
        cursor: pointer;
        font-size: 0.8rem;
        transition: all var(--transition-fast);
    }

    .logout-btn:hover {
        background: var(--gold-primary);
        color: var(--navy-deep);
        transform: translateY(-2px);
    }

    /* Main Container */
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1.5rem;
        position: relative;
        z-index: 2;
    }

    /* Section Cards - Glassmorphism */
    .section-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        margin-bottom: 2rem;
        overflow: hidden;
        transition: all var(--transition-smooth);
    }

    .section-card:hover {
        border-color: rgba(201, 160, 61, 0.3);
        box-shadow: var(--shadow-md);
    }

    .section-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .section-header h2 {
        font-family: 'Playfair Display', serif;
        font-size: 1.3rem;
        color: var(--gold-primary);
    }

    .section-header h2 i {
        margin-right: 0.5rem;
    }

    .btn-add {
        background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
        color: var(--navy-deep);
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all var(--transition-fast);
        box-shadow: 0 2px 8px rgba(201, 160, 61, 0.2);
    }

    .btn-add:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        box-shadow: var(--shadow-glow);
    }

    .section-content {
        padding: 1.5rem;
    }

    /* Event and Department Cards */
    .events-grid, .departments-list {
        display: grid;
        gap: 1rem;
    }

    .event-card, .dept-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        padding: 1rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        transition: all var(--transition-fast);
        border: 1px solid transparent;
    }

    .event-card:hover, .dept-card:hover {
        border-color: var(--glass-border);
        transform: translateX(4px);
    }

    .event-info, .dept-info {
        flex: 1;
    }

    .event-title, .dept-name {
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 0.25rem;
    }

    .event-date, .dept-lead {
        font-size: 0.8rem;
        color: var(--gold-primary);
    }

    .event-location, .dept-order {
        font-size: 0.75rem;
        color: #94A3B8;
    }

    .event-actions, .dept-actions {
        display: flex;
        gap: 0.5rem;
    }

    .btn-edit, .btn-delete {
        background: transparent;
        border: none;
        padding: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
        border-radius: 8px;
        transition: all var(--transition-fast);
    }

    .btn-edit { 
        color: var(--gold-primary); 
    }
    .btn-edit:hover { 
        background: rgba(201, 160, 61, 0.2); 
        transform: scale(1.05);
    }
    .btn-delete { 
        color: #ef4444; 
    }
    .btn-delete:hover { 
        background: rgba(239, 68, 68, 0.2); 
        transform: scale(1.05);
    }

    /* Prayer Request Cards */
    .prayers-grid {
        display: grid;
        gap: 1rem;
    }

    .prayer-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        padding: 1rem 1.25rem;
        transition: all var(--transition-fast);
        border: 1px solid transparent;
    }

    .prayer-card:hover {
        border-color: var(--glass-border);
        transform: translateX(4px);
    }

    .prayer-name {
        font-weight: 600;
        margin-bottom: 0.25rem;
    }

    .prayer-category {
        font-size: 0.7rem;
        color: var(--gold-primary);
        margin-bottom: 0.5rem;
    }

    .prayer-request {
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
        line-height: 1.5;
    }

    .prayer-status {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.7rem;
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
    }

    .prayer-status.responded {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
    }

    .btn-respond {
        background: rgba(201, 160, 61, 0.15);
        border: 1px solid var(--gold-primary);
        color: var(--gold-primary);
        padding: 0.4rem 1rem;
        border-radius: 50px;
        cursor: pointer;
        font-size: 0.75rem;
        margin-top: 0.5rem;
        transition: all var(--transition-fast);
    }

    .btn-respond:hover {
        background: var(--gold-primary);
        color: var(--navy-deep);
        transform: translateY(-2px);
    }

    /* Modals - Glassmorphism */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: var(--navy-mid);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 1.75rem;
        width: 90%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--glass-border);
    }

    .modal-header h3 {
        font-family: 'Playfair Display', serif;
        color: var(--gold-primary);
    }

    .close-modal {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--white-off);
        transition: all var(--transition-fast);
    }

    .close-modal:hover {
        color: var(--gold-primary);
        transform: scale(1.1);
    }

    /* Form Elements */
    .form-group {
        margin-bottom: 1.25rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--gold-light);
    }

    .form-group input, 
    .form-group textarea, 
    .form-group select {
        width: 100%;
        padding: 0.8rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: var(--white-off);
        font-size: 0.9rem;
        transition: all var(--transition-fast);
    }

    .form-group input:focus, 
    .form-group textarea:focus, 
    .form-group select:focus {
        outline: none;
        border-color: var(--gold-primary);
        box-shadow: var(--shadow-glow);
    }

    .btn-submit {
        background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
        color: var(--navy-deep);
        border: none;
        padding: 0.8rem;
        border-radius: 50px;
        width: 100%;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition-fast);
        margin-top: 0.5rem;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, var(--gold-light), var(--gold-primary));
        box-shadow: var(--shadow-glow);
    }

    /* Login Screen */
    .login-container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy-mid) 50%, var(--navy-light) 100%);
        padding: 1rem;
        position: relative;
    }

    .login-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
        background-repeat: repeat;
        pointer-events: none;
        opacity: 0.4;
    }

    .login-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 2rem;
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--glass-border);
        position: relative;
        z-index: 2;
        box-shadow: var(--shadow-lg);
    }

    .login-card h2 {
        font-family: 'Playfair Display', serif;
        text-align: center;
        margin-bottom: 1.5rem;
        color: var(--gold-primary);
    }

    .error-message {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        color: #ef4444;
        padding: 0.75rem;
        border-radius: 12px;
        margin-bottom: 1rem;
        font-size: 0.85rem;
        text-align: center;
    }

    .hidden {
        display: none;
    }

    /* Admin Only Section */
    .admin-only {
        border-color: rgba(201, 160, 61, 0.4);
    }

    .admin-badge {
        background: var(--gold-primary);
        color: var(--navy-deep);
        font-size: 0.7rem;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        margin-left: 0.5rem;
        font-weight: 600;
    }

    /* Loading & Empty States */
    .loading, .empty-state {
        text-align: center;
        padding: 2rem;
        color: #94A3B8;
    }

    .loading {
        position: relative;
    }

    .loading::after {
        content: '';
        display: inline-block;
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border: 2px solid var(--gold-primary);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: var(--navy-mid);
    }

    ::-webkit-scrollbar-thumb {
        background: var(--gold-primary);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--gold-light);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .header {
            padding: 0.5rem 1rem;
        }
        
        .container {
            padding: 1rem;
        }
        
        .event-card, .dept-card {
            flex-direction: column;
            text-align: left;
        }
        
        .event-actions, .dept-actions {
            width: 100%;
            justify-content: flex-end;
        }
        
        .section-header {
            flex-direction: column;
            align-items: flex-start;
        }
        
        .modal-content {
            padding: 1.25rem;
            margin: 1rem;
        }
    }

    @media (max-width: 480px) {
        .logo h1 {
            font-size: 1rem;
        }
        
        .user-info {
            gap: 0.5rem;
        }
        
        .logout-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
        }
    }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Kingdom Network Global Administrator</h2>
        <div id="loginError" class="error-message hidden"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@kingdomnetwork.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button class="btn-submit" onclick="login()">Login</button>
    </div>
</div>

<!-- Dashboard Screen -->
<div id="dashboardScreen" class="hidden">
    <div class="header">
        <div class="logo">
            <h1> Kingdom Network Global Admin</h1>
        </div>
        <div class="user-info">
            <span id="userRole" class="role-badge"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Events Section -->
        <div class="section-card">
            <div class="section-header">
                <h2> Events</h2>
                <button class="btn-add" onclick="showAddEventModal()">+ Add Event</button>
            </div>
            <div class="section-content">
                <div id="eventsList" class="events-grid">
                    <div class="loading">Loading events...</div>
                </div>
            </div>
        </div>

        <!-- Prayer Requests Section -->
        <div class="section-card">
            <div class="section-header">
                <h2> Prayer Requests</h2>
            </div>
            <div class="section-content">
                <div id="prayersList" class="prayers-grid">
                    <div class="loading">Loading prayer requests...</div>
                </div>
            </div>
        </div>

        <!-- Admin Only Section -->
        <div id="adminSection" class="section-card admin-only hidden">
            <div class="section-header">
                <h2> Admin Settings <span class="admin-badge">Admin Only</span></h2>
            </div>
            <div class="section-content">
                <button class="btn-add" onclick="openSettingsModal()"> Edit Ministry Settings</button>
                <button class="btn-add" style="margin-left: 0.5rem; background: transparent; border: 1px solid #C9A03D;" onclick="openDepartmentsModal()"> Edit Departments</button>
            </div>
        </div>
    </div>
</div>

<!-- Ministry Settings Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3> Edit Ministry Settings</h3>
            <button class="close-modal" onclick="closeSettingsModal()">&times;</button>
        </div>
        <form id="settingsForm" onsubmit="saveSettings(event)">
            <div class="form-group">
                <label>Mission Statement</label>
                <textarea id="settingsMission" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Vision Statement</label>
                <textarea id="settingsVision" rows="2" required></textarea>
            </div>
            <div class="form-group">
                <label>Pillar: Revelation</label>
                <textarea id="settingsRevelation" rows="2" required></textarea>
            </div>
            <div class="form-group">
                <label>Pillar: Manifestation</label>
                <textarea id="settingsManifestation" rows="2" required></textarea>
            </div>
            <div class="form-group">
                <label>Pillar: Experience</label>
                <textarea id="settingsExperience" rows="2" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Save Changes</button>
        </form>
    </div>
</div>

<!-- Departments Editor Modal -->
<div id="departmentsModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h3> Edit Departments</h3>
            <button class="close-modal" onclick="closeDepartmentsModal()">&times;</button>
        </div>
        <div id="departmentsList" style="max-height: 500px; overflow-y: auto;">
            <div class="loading">Loading departments...</div>
        </div>
    </div>
</div>

<!-- Edit Single Department Modal -->
<div id="editDeptModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="editDeptTitle">Edit Department</h3>
            <button class="close-modal" onclick="closeEditDeptModal()">&times;</button>
        </div>
        <form id="editDeptForm" onsubmit="saveDepartment(event)">
            <input type="hidden" id="editDeptId">
            <input type="hidden" id="editDeptKey">
            <div class="form-group">
                <label>Department Name</label>
                <input type="text" id="editDeptName" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="editDeptDescription" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Team Lead</label>
                <input type="text" id="editDeptLead" required>
            </div>
            <div class="form-group">
                <label>Display Order</label>
                <input type="number" id="editDeptOrder" required>
            </div>
            <button type="submit" class="btn-submit">Save Changes</button>
        </form>
    </div>
</div>

<!-- Add/Edit Event Modal -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="eventModalTitle">Add Event</h3>
            <button class="close-modal" onclick="closeEventModal()">&times;</button>
        </div>
        <form id="eventForm" onsubmit="saveEvent(event)">
            <input type="hidden" id="eventId">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="eventTitle" required>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="eventDate" required>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="eventLocation" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="eventDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Poster URL (optional)</label>
                <input type="text" id="eventPosterUrl" placeholder="https://...">
            </div>
            <button type="submit" class="btn-submit">Save Event</button>
        </form>
    </div>
</div>

<script>
    // API Configuration
    const API_BASE = 'http://127.0.0.1:8000/api';
    let authToken = null;
    let userRole = null;

    // Supabase Configuration
    const SUPABASE_URL = 'https://ydaqzysqrajmdnijbjes.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkYXF6eXNxcmFqbWRuaWpiamVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTMyODAsImV4cCI6MjA5NjcyOTI4MH0.OhrrRM2lqV3GKtwBZSl_aNJ_a2dkN-7z2e_SFsSThic';

    // Helper function to escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ========== AUTHENTICATION ==========
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');

        if (!email || !password) {
            errorDiv.textContent = 'Please enter email and password';
            errorDiv.classList.remove('hidden');
            return;
        }

        errorDiv.classList.add('hidden');

        try {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok && data.access_token) {
                authToken = data.access_token;
                userRole = data.user?.app_metadata?.role || 'user';
                
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                document.getElementById('userRole').textContent = userRole.toUpperCase();
                
                if (userRole === 'admin') {
                    document.getElementById('adminSection').classList.remove('hidden');
                }
                
                loadEvents();
                loadPrayers();
            } else {
                errorDiv.textContent = data.message || data.error_description || 'Login failed. Check email and password.';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            console.error('Login error:', error);
            errorDiv.textContent = 'Network error. Make sure Django server is running.';
            errorDiv.classList.remove('hidden');
        }
    }

    function logout() {
        authToken = null;
        userRole = null;
        document.getElementById('dashboardScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    }

    // Helper for API calls
    async function apiCall(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        if (authToken) {
            headers['Authorization'] = `Bearer ${authToken}`;
        }
        
        const response = await fetch(`${API_BASE}${url}`, {
            ...options,
            headers
        });
        
        if (response.status === 401) {
            logout();
            throw new Error('Session expired');
        }
        
        return response;
    }

    // ========== EVENTS ==========
    async function loadEvents() {
        const container = document.getElementById('eventsList');
        try {
            const response = await apiCall('/public/events/');
            const events = await response.json();
            
            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">No events yet. Click "Add Event" to create one.</div>';
                return;
            }
            
            container.innerHTML = events.map(event => `
                <div class="event-card">
                    <div class="event-info">
                        <div class="event-title">${escapeHtml(event.title)}</div>
                        <div class="event-date">📅 ${event.date}</div>
                        <div class="event-location">📍 ${escapeHtml(event.location)}</div>
                    </div>
                    <div class="event-actions">
                        <button class="btn-edit" onclick="editEvent('${event.id}')">✏️</button>
                        <button class="btn-delete" onclick="deleteEvent('${event.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            container.innerHTML = '<div class="empty-state">Failed to load events</div>';
        }
    }

    function showAddEventModal() {
        document.getElementById('eventModalTitle').textContent = 'Add Event';
        document.getElementById('eventId').value = '';
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventLocation').value = '';
        document.getElementById('eventDescription').value = '';
        document.getElementById('eventPosterUrl').value = '';
        document.getElementById('eventModal').style.display = 'flex';
    }

    async function editEvent(eventId) {
        try {
            const response = await apiCall(`/public/events/`);
            const events = await response.json();
            const event = events.find(e => e.id === eventId);
            
            if (event) {
                document.getElementById('eventModalTitle').textContent = 'Edit Event';
                document.getElementById('eventId').value = event.id;
                document.getElementById('eventTitle').value = event.title;
                document.getElementById('eventDate').value = event.date;
                document.getElementById('eventLocation').value = event.location;
                document.getElementById('eventDescription').value = event.description || '';
                document.getElementById('eventPosterUrl').value = event.poster_url || '';
                document.getElementById('eventModal').style.display = 'flex';
            }
        } catch (error) {
            alert('Failed to load event details');
        }
    }

    async function saveEvent(e) {
        e.preventDefault();
        
        const eventId = document.getElementById('eventId').value;
        const eventData = {
            title: document.getElementById('eventTitle').value,
            date: document.getElementById('eventDate').value,
            location: document.getElementById('eventLocation').value,
            description: document.getElementById('eventDescription').value,
            poster_url: document.getElementById('eventPosterUrl').value
        };
        
        try {
            let response;
            if (eventId) {
                response = await apiCall(`/events/${eventId}/`, {
                    method: 'PUT',
                    body: JSON.stringify(eventData)
                });
            } else {
                response = await apiCall('/events/', {
                    method: 'POST',
                    body: JSON.stringify(eventData)
                });
            }
            
            if (response.ok) {
                closeEventModal();
                loadEvents();
            } else {
                alert('Failed to save event');
            }
        } catch (error) {
            alert('Error saving event');
        }
    }

    async function deleteEvent(eventId) {
        if (confirm('Are you sure you want to delete this event?')) {
            try {
                const response = await apiCall(`/events/${eventId}/`, { method: 'DELETE' });
                if (response.ok) {
                    loadEvents();
                } else {
                    alert('Failed to delete event');
                }
            } catch (error) {
                alert('Error deleting event');
            }
        }
    }

    function closeEventModal() {
        document.getElementById('eventModal').style.display = 'none';
    }

    // ========== PRAYER REQUESTS ==========
    async function loadPrayers() {
        const container = document.getElementById('prayersList');
        try {
            const response = await apiCall('/prayers/');
            const prayers = await response.json();
            
            if (prayers.length === 0) {
                container.innerHTML = '<div class="empty-state">No prayer requests yet.</div>';
                return;
            }
            
            container.innerHTML = prayers.map(prayer => `
                <div class="prayer-card">
                    <div class="prayer-name">${escapeHtml(prayer.name)}</div>
                    <div class="prayer-category">📌 ${escapeHtml(prayer.category)}</div>
                    <div class="prayer-request">${escapeHtml(prayer.request)}</div>
                    <div class="prayer-status ${prayer.is_responded ? 'responded' : ''}">
                        ${prayer.is_responded ? '✓ Responded' : '⏳ Pending'}
                    </div>
                    ${!prayer.is_responded ? `<button class="btn-respond" onclick="markResponded('${prayer.id}')">Mark Responded</button>` : ''}
                </div>
            `).join('');
        } catch (error) {
            container.innerHTML = '<div class="empty-state">Failed to load prayer requests</div>';
        }
    }

    async function markResponded(prayerId) {
        try {
            const response = await apiCall(`/prayers/${prayerId}/respond/`, { method: 'PUT' });
            if (response.ok) {
                loadPrayers();
            } else {
                alert('Failed to mark as responded');
            }
        } catch (error) {
            alert('Error updating prayer request');
        }
    }

    // ========== MINISTRY SETTINGS ==========
    let currentSettingsId = null;

    async function openSettingsModal() {
        try {
            const response = await apiCall('/admin/settings/');
            const data = await response.json();
            
            currentSettingsId = data.id;
            document.getElementById('settingsMission').value = data.mission || '';
            document.getElementById('settingsVision').value = data.vision || '';
            document.getElementById('settingsRevelation').value = data.pillar_revelation || '';
            document.getElementById('settingsManifestation').value = data.pillar_manifestation || '';
            document.getElementById('settingsExperience').value = data.pillar_experience || '';
            
            document.getElementById('settingsModal').style.display = 'flex';
        } catch (error) {
            alert('Failed to load settings: ' + error.message);
        }
    }

    async function saveSettings(e) {
        e.preventDefault();
        
        const settingsData = {
            id: currentSettingsId,
            mission: document.getElementById('settingsMission').value,
            vision: document.getElementById('settingsVision').value,
            pillar_revelation: document.getElementById('settingsRevelation').value,
            pillar_manifestation: document.getElementById('settingsManifestation').value,
            pillar_experience: document.getElementById('settingsExperience').value
        };
        
        try {
            const response = await apiCall('/admin/settings/', {
                method: 'PUT',
                body: JSON.stringify(settingsData)
            });
            
            if (response.ok) {
                alert('✅ Settings saved successfully!');
                closeSettingsModal();
            } else {
                const error = await response.json();
                alert('❌ Failed to save: ' + (error.error || 'Unknown error'));
            }
        } catch (error) {
            alert('Error saving settings: ' + error.message);
        }
    }

    function closeSettingsModal() {
        document.getElementById('settingsModal').style.display = 'none';
    }

    // ========== DEPARTMENTS EDITOR ==========
    async function openDepartmentsModal() {
        document.getElementById('departmentsModal').style.display = 'flex';
        await loadDepartmentsForEdit();
    }

    async function loadDepartmentsForEdit() {
        const container = document.getElementById('departmentsList');
        container.innerHTML = '<div class="loading">Loading departments...</div>';
        
        try {
            const response = await apiCall('/admin/content/');
            const allContent = await response.json();
            const departments = allContent.filter(item => item.type === 'department');
            departments.sort((a, b) => (a.data?.order || 0) - (b.data?.order || 0));
            
            if (departments.length === 0) {
                container.innerHTML = '<div class="empty-state">No departments found</div>';
                return;
            }
            
            container.innerHTML = departments.map(dept => {
                const data = dept.data || {};
                return `
                    <div class="dept-card">
                        <div class="dept-info">
                            <div class="dept-name">${escapeHtml(data.name || dept.key)}</div>
                            <div class="dept-lead">👤 Team Lead: ${escapeHtml(data.team_lead || 'TBA')}</div>
                            <div class="dept-order">📌 Order: ${data.order || 0}</div>
                        </div>
                        <div class="dept-actions">
                            <button class="btn-edit" onclick="openEditDeptModal('${dept.id}', '${dept.key}')">✏️ Edit</button>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (error) {
            container.innerHTML = '<div class="empty-state">Failed to load departments</div>';
        }
    }

    async function openEditDeptModal(deptId, deptKey) {
        try {
            const response = await apiCall(`/admin/content/${deptId}/`);
            const dept = await response.json();
            const data = dept.data || {};
            
            document.getElementById('editDeptTitle').textContent = `Edit ${escapeHtml(data.name || deptKey)}`;
            document.getElementById('editDeptId').value = dept.id;
            document.getElementById('editDeptKey').value = dept.key;
            document.getElementById('editDeptName').value = data.name || '';
            document.getElementById('editDeptDescription').value = data.description || '';
            document.getElementById('editDeptLead').value = data.team_lead || '';
            document.getElementById('editDeptOrder').value = data.order || 0;
            
            document.getElementById('editDeptModal').style.display = 'flex';
        } catch (error) {
            alert('Failed to load department: ' + error.message);
        }
    }

    async function saveDepartment(e) {
        e.preventDefault();
        
        const deptId = document.getElementById('editDeptId').value;
        const updateData = {
            data: {
                name: document.getElementById('editDeptName').value,
                description: document.getElementById('editDeptDescription').value,
                team_lead: document.getElementById('editDeptLead').value,
                order: parseInt(document.getElementById('editDeptOrder').value)
            }
        };
        
        try {
            const response = await apiCall(`/admin/content/${deptId}/`, {
                method: 'PUT',
                body: JSON.stringify(updateData)
            });
            
            if (response.ok) {
                alert('✅ Department saved successfully!');
                closeEditDeptModal();
                await loadDepartmentsForEdit();
            } else {
                alert('❌ Failed to save department');
            }
        } catch (error) {
            alert('Error saving department: ' + error.message);
        }
    }

    function closeDepartmentsModal() {
        document.getElementById('departmentsModal').style.display = 'none';
    }

    function closeEditDeptModal() {
        document.getElementById('editDeptModal').style.display = 'none';
    }

    // Close modals when clicking outside
    window.onclick = function(event) {
        const eventModal = document.getElementById('eventModal');
        const settingsModal = document.getElementById('settingsModal');
        const deptsModal = document.getElementById('departmentsModal');
        const editDeptModal = document.getElementById('editDeptModal');
        
        if (event.target === eventModal) closeEventModal();
        if (event.target === settingsModal) closeSettingsModal();
        if (event.target === deptsModal) closeDepartmentsModal();
        if (event.target === editDeptModal) closeEditDeptModal();
    }
</script>
</body>
